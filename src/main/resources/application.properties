spring.application.name=logindemo
server.port=8080

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=3600000


cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}


cookie.secure=${COOKIE_SECURE:false}
cookie.max-age=${COOKIE_MAX_AGE:3600}

# Refresh token - longer-lived (3 hours), used to mint a new access token without re-login
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:10800000}
cookie.refresh-max-age=${COOKIE_REFRESH_MAX_AGE:10800}

# OAuth2 - GitHub login (client id/secret come from environment variables, never hardcoded)
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user

# Where to send the user back after a successful OAuth login
app.frontend-url=${FRONTEND_URL:http://localhost:5173}