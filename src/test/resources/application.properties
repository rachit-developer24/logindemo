spring.application.name=logindemo

# Test-only config: literal values so the Spring context loads in tests
# without needing environment variables (JWT_SECRET, GITHUB_CLIENT_ID, etc.).
jwt.secret=test-secret-key-at-least-32-characters-long!!
jwt.expiration-ms=3600000
jwt.refresh-expiration-ms=10800000

cors.allowed-origins=http://localhost:5173

cookie.secure=false
cookie.max-age=3600
cookie.refresh-max-age=10800

spring.security.oauth2.client.registration.github.client-id=test-client-id
spring.security.oauth2.client.registration.github.client-secret=test-client-secret
spring.security.oauth2.client.registration.github.scope=read:user

app.frontend-url=http://localhost:5173
